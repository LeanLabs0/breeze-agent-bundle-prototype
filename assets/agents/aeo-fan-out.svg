<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AEO Fan-Out Query Agent">
  <defs>
    <radialGradient id="fanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#141414"/>
  <circle cx="200" cy="200" r="150" fill="url(#fanGlow)"/>

  <!-- fan-out rays -->
  <g stroke="#2B2B2B" stroke-width="1.5" fill="none">
    <path d="M200 200 L96 108"/>  <path d="M200 200 L88 196"/>
    <path d="M200 200 L104 292"/> <path d="M200 200 L196 316"/>
    <path d="M200 200 L300 296"/> <path d="M200 200 L316 204"/>
    <path d="M200 200 L296 104"/> <path d="M200 200 L204 84"/>
  </g>

  <!-- outer query nodes -->
  <g fill="#212121" stroke="#3A3A3A" stroke-width="1.5">
    <circle cx="96"  cy="108" r="16"/>
    <circle cx="88"  cy="196" r="12"/>
    <circle cx="104" cy="292" r="14"/>
    <circle cx="196" cy="316" r="11"/>
    <circle cx="300" cy="296" r="15"/>
    <circle cx="316" cy="204" r="12"/>
    <circle cx="296" cy="104" r="13"/>
  </g>

  <!-- the ones you're winning -->
  <g fill="#FDE68A" opacity=".9">
    <circle cx="204" cy="84"  r="13"/>
    <circle cx="316" cy="204" r="6"/>
    <circle cx="96"  cy="108" r="6"/>
  </g>

  <!-- centre: the topic -->
  <circle cx="200" cy="200" r="34" fill="#0D0D0D" stroke="#FFFFFF" stroke-width="2"/>
  <g stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round">
    <circle cx="196" cy="196" r="11"/>
    <path d="M204 204 L212 212"/>
  </g>
</svg>
