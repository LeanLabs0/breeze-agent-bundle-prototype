<svg viewBox="0 0 450 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The five Breeze agents">
  <defs>
    <radialGradient id="cGlow" cx="50%" cy="34%" r="62%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity=".10"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cTile"><rect width="170" height="170" rx="14"/></clipPath>
  </defs>

  <rect width="450" height="800" fill="#0D0D0D"/>
  <rect width="450" height="800" fill="url(#cGlow)"/>

  <!-- 01 AEO fan-out -->
  <g transform="translate(46,96)">
    <g clip-path="url(#cTile)">
      <rect width="170" height="170" fill="#141414"/>
      <g stroke="#2B2B2B" stroke-width="1.2" fill="none">
        <path d="M85 85 L36 42"/><path d="M85 85 L30 84"/><path d="M85 85 L40 128"/>
        <path d="M85 85 L130 128"/><path d="M85 85 L138 86"/><path d="M85 85 L128 40"/>
      </g>
      <g fill="#212121" stroke="#3A3A3A" stroke-width="1.2">
        <circle cx="36" cy="42" r="8"/><circle cx="30" cy="84" r="6"/><circle cx="40" cy="128" r="7"/>
        <circle cx="130" cy="128" r="7"/><circle cx="138" cy="86" r="6"/><circle cx="128" cy="40" r="7"/>
      </g>
      <circle cx="36" cy="42" r="3.4" fill="#FDE68A"/>
      <circle cx="138" cy="86" r="3" fill="#FDE68A"/>
      <circle cx="85" cy="85" r="17" fill="#0D0D0D" stroke="#fff" stroke-width="1.6"/>
      <g stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round">
        <circle cx="83" cy="83" r="5.5"/><path d="M87 87 L92 92"/>
      </g>
    </g>
    <rect width="170" height="170" rx="14" fill="none" stroke="#2B2B2B"/>
  </g>

  <!-- 02 topic cluster -->
  <g transform="translate(234,96)">
    <g clip-path="url(#cTile)">
      <rect width="170" height="170" fill="#141414"/>
      <g stroke="#2B2B2B" stroke-width="1.2" fill="none">
        <path d="M85 85 L46 50"/><path d="M85 85 L128 52"/>
        <path d="M85 85 L124 118"/><path d="M85 85 L48 122"/>
      </g>
      <g fill="#212121" stroke="#3A3A3A" stroke-width="1.2">
        <circle cx="46" cy="50" r="15"/><circle cx="128" cy="52" r="10"/>
        <circle cx="124" cy="118" r="12"/><circle cx="48" cy="122" r="8"/>
      </g>
      <circle cx="46" cy="50" r="15" fill="none" stroke="#FDE68A" stroke-width="1.4" opacity=".85"/>
      <circle cx="85" cy="85" r="19" fill="#0D0D0D" stroke="#fff" stroke-width="1.6"/>
      <g fill="#fff">
        <circle cx="85" cy="85" r="2.6"/><circle cx="85" cy="76" r="1.8"/>
        <circle cx="93" cy="90" r="1.8"/><circle cx="77" cy="90" r="1.8"/>
      </g>
    </g>
    <rect width="170" height="170" rx="14" fill="none" stroke="#2B2B2B"/>
  </g>

  <!-- 03 keyword research -->
  <g transform="translate(46,284)">
    <g clip-path="url(#cTile)">
      <rect width="170" height="170" fill="#141414"/>
      <path d="M26 132 L144 132" stroke="#2B2B2B" stroke-width="1.2"/>
      <g fill="#212121" stroke="#3A3A3A" stroke-width="1.2">
        <rect x="30" y="86"  width="17" height="46" rx="3"/>
        <rect x="53" y="64"  width="17" height="68" rx="3"/>
        <rect x="76" y="100" width="17" height="32" rx="3"/>
        <rect x="122" y="56" width="17" height="76" rx="3"/>
      </g>
      <rect x="99" y="112" width="17" height="20" rx="3" fill="#FDE68A" opacity=".92"/>
      <circle cx="107" cy="46" r="15" fill="#0D0D0D" stroke="#FDE68A" stroke-width="1.6"/>
      <path d="M100 46 L105 51 L114 41" fill="none" stroke="#FDE68A" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <rect width="170" height="170" rx="14" fill="none" stroke="#2B2B2B"/>
  </g>

  <!-- 04 schema -->
  <g transform="translate(234,284)">
    <g clip-path="url(#cTile)">
      <rect width="170" height="170" fill="#141414"/>
      <g stroke="#3A3A3A" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M50 54 L34 85 L50 116"/>
        <path d="M120 54 L136 85 L120 116"/>
      </g>
      <g>
        <rect x="60" y="58" width="50" height="7" rx="3.5" fill="#2B2B2B"/>
        <rect x="60" y="58" width="22" height="7" rx="3.5" fill="#FDE68A" opacity=".85"/>
        <rect x="66" y="74" width="40" height="7" rx="3.5" fill="#2B2B2B"/>
        <rect x="66" y="74" width="16" height="7" rx="3.5" fill="#575757"/>
        <rect x="66" y="90" width="44" height="7" rx="3.5" fill="#2B2B2B"/>
        <rect x="66" y="90" width="24" height="7" rx="3.5" fill="#575757"/>
        <rect x="60" y="106" width="50" height="7" rx="3.5" fill="#2B2B2B"/>
        <rect x="60" y="106" width="18" height="7" rx="3.5" fill="#FDE68A" opacity=".55"/>
      </g>
      <circle cx="85" cy="138" r="13" fill="#0D0D0D" stroke="#fff" stroke-width="1.6"/>
      <g fill="#fff">
        <circle cx="85" cy="138" r="2.2"/><circle cx="85" cy="131" r="1.5"/>
        <circle cx="91" cy="142" r="1.5"/><circle cx="79" cy="142" r="1.5"/>
      </g>
    </g>
    <rect width="170" height="170" rx="14" fill="none" stroke="#2B2B2B"/>
  </g>

  <!-- 05 conversion grader — wide, spans both columns -->
  <g transform="translate(46,472)">
    <clipPath id="cWide"><rect width="358" height="170" rx="14"/></clipPath>
    <g clip-path="url(#cWide)">
      <rect width="358" height="170" fill="#141414"/>
      <path d="M116 124 A 62 62 0 1 1 234 124" fill="none" stroke="#2B2B2B"
            stroke-width="11" stroke-linecap="round"/>
      <path d="M116 124 A 62 62 0 0 1 213 35" fill="none" stroke="#FDE68A"
            stroke-width="11" stroke-linecap="round" opacity=".92"/>
      <path d="M175 105 L205 60" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="175" cy="105" r="7" fill="#0D0D0D" stroke="#fff" stroke-width="1.6"/>
      <g>
        <rect x="136" y="140" width="78" height="6" rx="3" fill="#2B2B2B"/>
        <rect x="136" y="140" width="28" height="6" rx="3" fill="#FDE68A" opacity=".8"/>
      </g>
    </g>
    <rect width="358" height="170" rx="14" fill="none" stroke="#2B2B2B"/>
  </g>

  <!-- caption -->
  <text x="225" y="700" text-anchor="middle" fill="#FFFFFF"
        font-family="'Plus Jakarta Sans',Arial,sans-serif" font-size="26" font-weight="600">Five agents.</text>
  <text x="225" y="732" text-anchor="middle" fill="#949494"
        font-family="Roboto,Arial,sans-serif" font-size="16">Installed in your portal, free.</text>
</svg>
