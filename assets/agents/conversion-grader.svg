<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Website Conversion Grader">
  <rect width="400" height="400" fill="#141414"/>

  <!-- gauge track -->
  <path d="M96 268 A 110 110 0 1 1 304 268" fill="none" stroke="#2B2B2B"
        stroke-width="18" stroke-linecap="round"/>

  <!-- score arc: ~62 / 100 -->
  <path d="M96 268 A 110 110 0 0 1 268 111" fill="none" stroke="#FDE68A"
        stroke-width="18" stroke-linecap="round" opacity=".92"/>

  <!-- ticks -->
  <g stroke="#3A3A3A" stroke-width="2" stroke-linecap="round">
    <path d="M78 244 L60 250"/>
    <path d="M112 150 L98 138"/>
    <path d="M200 112 L200 94"/>
    <path d="M288 150 L302 138"/>
    <path d="M322 244 L340 250"/>
  </g>

  <!-- needle -->
  <g stroke="#FFFFFF" stroke-width="4" stroke-linecap="round">
    <path d="M200 232 L252 152"/>
  </g>
  <circle cx="200" cy="232" r="12" fill="#0D0D0D" stroke="#FFFFFF" stroke-width="2.4"/>

  <!-- the fix list -->
  <g>
    <rect x="140" y="292" width="120" height="10" rx="5" fill="#2B2B2B"/>
    <rect x="140" y="292" width="44"  height="10" rx="5" fill="#FDE68A" opacity=".8"/>
    <rect x="152" y="314" width="96" height="10" rx="5" fill="#2B2B2B"/>
    <rect x="152" y="314" width="30" height="10" rx="5" fill="#575757"/>
    <rect x="164" y="336" width="72" height="10" rx="5" fill="#2B2B2B"/>
  </g>
</svg>
