<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SEO Keyword Research Agent">
  <rect width="400" height="400" fill="#141414"/>

  <!-- baseline -->
  <path d="M72 300 L328 300" stroke="#2B2B2B" stroke-width="1.5"/>

  <!-- difficulty bars — the competition -->
  <g fill="#212121" stroke="#3A3A3A" stroke-width="1.5">
    <rect x="80"  y="196" width="34" height="104" rx="5"/>
    <rect x="126" y="152" width="34" height="148" rx="5"/>
    <rect x="172" y="228" width="34" height="72"  rx="5"/>
    <rect x="264" y="136" width="34" height="164" rx="5"/>
    <rect x="310" y="212" width="18" height="88"  rx="5"/>
  </g>

  <!-- the gap: your shot -->
  <rect x="218" y="252" width="34" height="48" rx="5" fill="#FDE68A" opacity=".92"/>
  <path d="M235 240 L235 122" stroke="#FDE68A" stroke-width="1.5" stroke-dasharray="4 5" opacity=".6"/>

  <!-- verdict badge -->
  <circle cx="235" cy="106" r="30" fill="#0D0D0D" stroke="#FDE68A" stroke-width="2"/>
  <path d="M222 106 L231 116 L249 96" fill="none" stroke="#FDE68A" stroke-width="3.4"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- axis ticks -->
  <g fill="#3A3A3A">
    <rect x="80"  y="312" width="34" height="3" rx="1.5"/>
    <rect x="126" y="312" width="34" height="3" rx="1.5"/>
    <rect x="172" y="312" width="34" height="3" rx="1.5"/>
    <rect x="218" y="312" width="34" height="3" rx="1.5" fill="#FDE68A" opacity=".5"/>
    <rect x="264" y="312" width="34" height="3" rx="1.5"/>
  </g>
</svg>
