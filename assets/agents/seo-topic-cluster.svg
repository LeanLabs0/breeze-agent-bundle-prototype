<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SEO Topic Cluster Analyzer">
  <rect width="400" height="400" fill="#141414"/>

  <!-- links -->
  <g stroke="#2B2B2B" stroke-width="1.5" fill="none">
    <path d="M200 200 L112 128"/> <path d="M200 200 L300 132"/>
    <path d="M200 200 L288 268"/> <path d="M200 200 L120 276"/>
    <path d="M112 128 L84 208"/>  <path d="M300 132 L332 200"/>
    <path d="M288 268 L216 320"/> <path d="M120 276 L168 328"/>
  </g>

  <!-- cluster nodes, radius = search volume -->
  <g fill="#212121" stroke="#3A3A3A" stroke-width="1.5">
    <circle cx="112" cy="128" r="30"/>
    <circle cx="300" cy="132" r="22"/>
    <circle cx="288" cy="268" r="26"/>
    <circle cx="120" cy="276" r="18"/>
    <circle cx="84"  cy="208" r="12"/>
    <circle cx="332" cy="200" r="10"/>
    <circle cx="216" cy="320" r="14"/>
    <circle cx="168" cy="328" r="9"/>
  </g>

  <!-- biggest volume highlighted -->
  <circle cx="112" cy="128" r="30" fill="none" stroke="#FDE68A" stroke-width="2" opacity=".85"/>
  <circle cx="288" cy="268" r="26" fill="none" stroke="#FDE68A" stroke-width="1.5" opacity=".45"/>

  <!-- hub -->
  <circle cx="200" cy="200" r="38" fill="#0D0D0D" stroke="#FFFFFF" stroke-width="2"/>
  <g fill="#FFFFFF">
    <circle cx="200" cy="200" r="5"/>
    <circle cx="200" cy="182" r="3.2"/>
    <circle cx="216" cy="209" r="3.2"/>
    <circle cx="184" cy="209" r="3.2"/>
  </g>
  <g stroke="#FFFFFF" stroke-width="1.4" opacity=".7">
    <path d="M200 195 L200 185"/>
    <path d="M204 203 L213 208"/>
    <path d="M196 203 L187 208"/>
  </g>
</svg>
